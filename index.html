<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- displays site properly based on user's device -->
    <title>Order summary card by Pietro</title>

    <link rel="stylesheet" href="styles.css" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Red+Hat+Display:ital,wght@0,300..900;1,300..900&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div class="root-container">
      <div class="order-summary-card">
        <figure class="main-img">
          <img
            src="images/illustration-hero.svg"
            alt="cartoon woman dancing to music"
          />
        </figure>
        <div class="bottom-half">
          <div class="order-summary-text">
            <h2 class="os">Order Summary</h2>
            <p class="txt-desc">
              You can now listen to millions of songs, audiobooks, and podcasts
              on any device anywhere you like!
            </p>
          </div>
          <div class="plan-details">
            <img
              src="images/icon-music.svg"
              alt="music-icon"
              class="music-icon"
            />
            <div class="annual-plan">
              <p class="ap-text">Annual Plan</p>
              <div class="price">$59.99/year</div>
            </div>
            <div class="change">
              <p class="change-txt">Change</p>
            </div>
          </div>
          <div class="buttons">
            <p class="pmt">Proceed to Payment</p>
            <p class="cxl">Cancel Order</p>
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
